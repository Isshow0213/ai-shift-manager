<h1>シフト希望提出</h1>

<p>
  ログイン中のユーザー：{{ request.user.username }}
</p>

{% if membership %}
  <p>
    所属店舗：{{ membership.store.name }}
  </p>
{% else %}
  <p>
    所属店舗：未設定
  </p>
{% endif %}

<hr>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">提出する</button>
</form>

<p>
  <a href="{% url 'availability_list' %}">提出済み一覧へ戻る</a>
</p>
