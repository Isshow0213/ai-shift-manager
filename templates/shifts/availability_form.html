<h1>シフト希望提出</h1>

<p>
  氏名：{{ request.user.full_name_japanese }}
</p>

{% if membership %}
  <p>所属店舗：{{ membership.store.name }}</p>
{% endif %}

<p>
  選択日：{{ selected_date|date:"Y年m月d日" }}
</p>

<hr>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">提出する</button>
</form>

<p>
  <a href="{% url 'availability_list' %}">カレンダーへ戻る</a>
</p>
